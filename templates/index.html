<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prediksi Penduduk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Style -->
    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            font-weight: bold;
        }

        .btn-custom {
            background-color: #4facfe;
            border: none;
        }

        .btn-custom:hover {
            background-color: #00c6ff;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card p-4">

                <h2 class="text-center mb-3">🔮 Prediksi Penduduk</h2>
                <p class="text-center text-muted">Menggunakan Artificial Neural Network</p>

                <form action="/predict" method="post">

                    <label class="fw-bold">Masukkan Tahun</label>
                    <input type="number" name="tahun" class="form-control mb-3" placeholder="Contoh: 2025" required>

                    <button class="btn btn-custom w-100 text-white">
                        🚀 Prediksi Sekarang
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
